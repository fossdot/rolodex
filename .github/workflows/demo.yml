name: Deploy demo to GitHub Pages

# Builds the static, backend-less interactive demo (frontend with VITE_DEMO=1,
# served from the /rolodex subpath) and publishes it to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source:
# "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress production run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build:demo
      - name: SPA fallback for deep links
        run: cp build/index.html build/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
